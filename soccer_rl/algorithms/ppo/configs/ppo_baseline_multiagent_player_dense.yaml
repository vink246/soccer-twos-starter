# PPO — multiagent_player + dense reward shaping (same preset as default config.yaml).

run:
  output_dir: runs
  max_timesteps: 2000000
  plot_freq: 10
  checkpoint_freq: 10

resources:
  num_workers: 8
  num_gpus: 1
  num_envs_per_worker: 3

rllib:
  log_level: INFO
  framework: torch
  model:
    preset: baseline
    vf_share_layers: true
    fcnet_hiddens: [512, 512]
    fcnet_activation: relu
  rollout_fragment_length: 500
  train_batch_size: 12000

env:
  variation: multiagent_player
  multiagent: true
  single_player: false
  flatten_branched: true
  reward:
    enabled: true
    sparse_weight: 1.0
    dense_weight: 0.05
    dense_warmup_steps: 0
    dense_budget_per_episode: 50.0
    goal_reward_dominates: true
    goal_reward_threshold: 0.9
    distance_norm_scale: 1.5
    trajectory_lane_width: 0.4
    opponent_goal_xy: [1.0, 0.0]
    team_map:
      team_0: [0, 1]
      team_1: [2, 3]
    dense_clip:
      enabled: true
      min: -1.0
      max: 1.0
    enabled_terms:
      - ball_progress
      - ball_goal_distance
      - trajectory_support
      - opponent_pressure
    terms:
      ball_progress:
        enabled: true
        weight: 1.0
      ball_goal_distance:
        enabled: true
        weight: 0.3
      trajectory_support:
        enabled: true
        weight: 0.2
      opponent_pressure:
        enabled: true
        weight: 0.1

multiagent:
  policy_mode: team_shared
