run:
  name: dqn_single_random_opp
  seed: 0
  local_dir: runs
  checkpoint_every_steps: 10000
  stop:
    total_timesteps: 50000

device: auto

training_mode:
  single_agent: true
  teammate_policy: still
  opponent_policy: random

env:
  flatten_branched: true
  base_port: 50040
  worker_id: 0

metrics:
  goal_reward_threshold: 0.25

algorithm:
  type: dqn

model:
  architecture: mlp_q
  hidden_sizes: [256, 256]
