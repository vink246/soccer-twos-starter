run:
  name: ppo_team_vs_random
  seed: 0
  local_dir: runs
  checkpoint_every_iterations: 10
  stop:
    total_timesteps: 50000

device: auto

training_mode:
  single_agent: false
  opponent_team_policy: random

env:
  flatten_branched: true
  base_port: 50041
  worker_id: 0

metrics:
  goal_reward_threshold: 0.25

algorithm:
  type: ppo

rollout:
  n_steps: 1024

model:
  architecture: mlp_actor_critic
  hidden_sizes: [256, 256]
