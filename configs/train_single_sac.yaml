run:
  name: sac_single_still
  seed: 0
  local_dir: runs
  checkpoint_every_steps: 10000
  stop:
    total_timesteps: 50000

device: auto

training_mode:
  single_agent: true
  teammate_policy: still
  opponent_policy: still

env:
  flatten_branched: true
  base_port: 50042
  worker_id: 0

metrics:
  goal_reward_threshold: 0.25

algorithm:
  type: sac

model:
  actor_architecture: mlp_categorical_actor
  critic_architecture: mlp_double_q
  hidden_sizes: [256, 256]
