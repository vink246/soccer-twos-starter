run:
  name: handcrafted_artisinal_dl_v1
  seed: 0
  local_dir: runs
  checkpoint_every_iterations: 100
  plot_on_checkpoint: true
  stop:
    total_timesteps: 10000000

device: auto

training_mode:
  single_agent: true
  # Opponent uses the frozen checkpoint from agents/ppo_dense_agent_ceia_trained.
  opponent_policy:
    kind: checkpoint
    path: agents/ppo_dense_agent_ceia_trained/checkpoint.pth
    obs_dim: 336
    deterministic: true
    model:
      architecture: mlp_actor_critic
      hidden_sizes: [512, 512]
  # Teammate uses the current learner policy weights (shared, updated online).
  self_teammate: true
  self_teammate_deterministic: true

env:
  flatten_branched: true
  base_port: 50039
  worker_id: 0

metrics:
  goal_reward_threshold: 0.25
  sparse_goal_reward_threshold: 0.9

algorithm:
  type: ppo
  lr: 0.0001
  ent_coef: 0.02
  vf_coef: 0.35
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.15
  max_grad_norm: 0.5
  n_epochs: 3
  batch_size: 1024

rollout:
  n_steps: 4096

model:
  architecture: mlp_actor_critic
  hidden_sizes: [512, 512]

dense_reward:
  enabled: true
  # Slightly upweight sparse env goals vs shaping.
  sparse_weight: 1.1
  # Cap total dense per step.
  clip: 0.4
  terms:
    # --- offense: move ball toward opponent goal, stay near ball ---
    ball_opponent_goal_potential_delta:
      weight: 0.08
      opponent_goal_xy: [1.0, 0.0]
    ball_vel_attack_component:
      weight: 0.025
      axis: 0
      attack_sign: 1.0
    distance_to_ball_closer_delta:
      weight: 0.018
      distance_scale: 1.0

    # --- defense: if ball is on our side, reduce threat and screen goal ---
    ball_own_goal_threat_gaussian:
      weight: 0.045
      sigma: 0.35
      own_goal_xy: [-1.0, 0.0]
    screen_own_goal:
      weight: 0.02
      axis: 0
      attack_sign: 1.0
      own_goal_xy: [-1.0, 0.0]
