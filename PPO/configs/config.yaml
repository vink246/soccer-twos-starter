# PPO training config for Soccer-Twos
# Copy this file to create per-run configs (e.g. config_fast.yaml, config_long.yaml).
# Path: pass with --config PPO/configs/your_config.yaml

# Run / output
run:
  output_dir: runs
  max_timesteps: 2000000
  plot_freq: 10
  checkpoint_freq: 10

# Resources (CLI flags override these)
resources:
  num_workers: 8
  num_gpus: 1
  num_envs_per_worker: 3

# RLlib PPO / model (passed to tune.run config)
rllib:
  log_level: INFO
  framework: torch
  model:
    preset: baseline
    vf_share_layers: true
    fcnet_hiddens: [512, 512]
    fcnet_activation: relu
  rollout_fragment_length: 500
  train_batch_size: 12000

# Environment mode + reward shaping
env:
  variation: multiagent_player   # Env variant: team_vs_policy | multiagent_team | multiagent_player
  multiagent: true               # true = env returns dict obs/reward per agent
  single_player: false           # only relevant for team_vs_policy mode
  flatten_branched: true         # flatten MultiDiscrete action branches for RLlib
  reward:
    enabled: true                # enable PPO-side reward shaping wrapper
    sparse_weight: 1.0           # multiplier for base env reward
    dense_weight: 0.05           # multiplier for summed dense terms
    dense_warmup_steps: 0        # steps before dense shaping starts
    dense_budget_per_episode: 50.0  # cap on total abs dense reward per episode
    goal_reward_dominates: true  # if goal reward appears, ignore dense shaping that step
    goal_reward_threshold: 0.9   # abs(base_reward) threshold to treat as terminal goal
    distance_norm_scale: 1.5     # normalization scale for distance-based terms
    trajectory_lane_width: 0.4   # width for trajectory_support term
    opponent_goal_xy: [1.0, 0.0] # goal location used by distance/progress terms
    team_map:
      team_0: [0, 1]             # agent ids on team 0
      team_1: [2, 3]             # agent ids on team 1
    dense_clip:
      enabled: true              # clip total dense reward per agent per step
      min: -1.0                  # lower clip bound
      max: 1.0                   # upper clip bound
    enabled_terms:
      - ball_progress            # potential-based ball progress toward goal
      - ball_goal_distance       # negative distance from ball to opponent goal
      - trajectory_support       # reward proximity to ball->goal lane
      - opponent_pressure        # reward pushing opponents away from ball lane
    terms:
      ball_progress:
        enabled: true            # include this term in dense sum
        weight: 1.0              # relative weight for this term
      ball_goal_distance:
        enabled: true            # include this term in dense sum
        weight: 0.3              # relative weight for this term
      trajectory_support:
        enabled: true            # include this term in dense sum
        weight: 0.2              # relative weight for this term
      opponent_pressure:
        enabled: true            # include this term in dense sum
        weight: 0.1              # relative weight for this term

# Multiagent policy mapping mode
multiagent:
  policy_mode: team_shared   # team_shared | per_player | shared_all
